server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/cloud_notes/nav;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /notes {
        return 301 /notes/;
    }

    location /notes/ {
        alias /opt/cloud_notes/app/frontend/dist/;
        try_files $uri $uri/ /notes/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:1873/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}

server {
    listen 1872;
    listen [::]:1872;
    server_name _;

    root /opt/cloud_notes/app/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:1873/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
